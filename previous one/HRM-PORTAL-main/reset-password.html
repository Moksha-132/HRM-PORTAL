<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | shnoor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
        background-color: #f3f4f6;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
    }
    .reset-card {
        background: #fff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
    }
    .auth-brand {
        font-size: 1.5rem;
        font-weight: 800;
        color: #4f46e5;
        display: block;
        text-align: center;
        margin-bottom: 24px;
    }
    .auth-heading {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 8px;
        text-align: center;
    }
    .auth-sub-text {
        font-size: 0.9rem;
        color: #6b7280;
        text-align: center;
        margin-bottom: 24px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.85rem;
        font-weight: 500;
    }
    input {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 0.9rem;
    }
    .btn {
        width: 100%;
        padding: 12px;
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
    }
    .error {
        color: #dc2626;
        background: #fef2f2;
        padding: 12px;
        border-radius: 6px;
        font-size: 0.85rem;
        margin-bottom: 20px;
        border: 1px solid #fee2e2;
        display: none;
    }
    .success {
        color: #059669;
        background: #ecfdf5;
        padding: 12px;
        border-radius: 6px;
        font-size: 0.85rem;
        margin-bottom: 20px;
        border: 1px solid #d1fae5;
        display: none;
    }
  </style>
</head>
<body>
  <div class="reset-card">
    <span class="auth-brand">shnoor</span>
    <h2 class="auth-heading">Set New Password</h2>
    <p class="auth-sub-text">Please enter your new password below</p>
    
    <div id="reset-error" class="error"></div>
    <div id="reset-success" class="success"></div>

    <form id="reset-form">
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" name="password" placeholder="••••••••" required minlength="6" />
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm New Password</label>
        <input type="password" id="confirm-password" name="confirmPassword" placeholder="••••••••" required minlength="6" />
      </div>
      <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin-top: -10px;">
        <input type="checkbox" id="show-passwords" style="width: auto;" />
        <label for="show-passwords" style="margin-bottom: 0;">Show Passwords</label>
      </div>
      <button type="submit" class="btn" id="reset-submit">Reset Password</button>
    </form>
    
    <div style="text-align: center; margin-top: 24px;">
        <a href="index.html#login" style="color: #4f46e5; text-decoration: none; font-size: 0.9rem;">Back to Login</a>
    </div>
  </div>

  <script>
    const resetForm = document.getElementById('reset-form');
    const resetError = document.getElementById('reset-error');
    const resetSuccess = document.getElementById('reset-success');
    const submitBtn = document.getElementById('reset-submit');

    // Show/Hide Password Toggle
    document.getElementById('show-passwords')?.addEventListener('change', function() {
        const inputs = [document.getElementById('new-password'), document.getElementById('confirm-password')];
        inputs.forEach(input => {
            if (input) input.type = this.checked ? 'text' : 'password';
        });
    });

    resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        
        if (password !== confirmPassword) {
            resetError.textContent = 'Passwords do not match';
            resetError.style.display = 'block';
            return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const role = urlParams.get('role');



        if (!token) {
            resetError.textContent = 'Invalid reset token';
            resetError.style.display = 'block';
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Resetting...';
        resetError.style.display = 'none';
        resetSuccess.style.display = 'none';

        try {
            const res = await fetch(`/api/v1/auth/resetpassword/${token}${role ? '?role=employee' : ''}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await res.json();
            if (res.ok && data.success) {
                resetSuccess.textContent = data.message;
                resetSuccess.style.display = 'block';
                resetForm.style.display = 'none';
                setTimeout(() => {
                    window.location.href = 'index.html#login';
                }, 3000);
            } else {
                resetError.textContent = data.error || 'Password reset failed.';
                resetError.style.display = 'block';
            }
        } catch (err) {
            resetError.textContent = 'Network error. Please try again.';
            resetError.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Reset Password';
        }
    });
  </script>
</body>
</html>
