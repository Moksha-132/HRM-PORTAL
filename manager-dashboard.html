<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manager Dashboard – shnoor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-top">
      <span class="sidebar-brand">shnoor</span>
      <span class="sidebar-tag">Manager</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="sidebar-link active" id="nav-dashboard">
        <span class="nav-icon"><i class="fas fa-th-large"></i></span> Dashboard
      </a>
      <a href="#" class="sidebar-link" id="nav-employees">
        <span class="nav-icon"><i class="fas fa-users"></i></span> Employees
      </a>
      <a href="#" class="sidebar-link" id="nav-attendance">
        <span class="nav-icon"><i class="fas fa-clock"></i></span> Attendance
      </a>
      <a href="#" class="sidebar-link" id="nav-leaves">
        <span class="nav-icon"><i class="fas fa-calendar-alt"></i></span> Leaves
      </a>
      <a href="#" class="sidebar-link" id="nav-assets">
        <span class="nav-icon"><i class="fas fa-laptop"></i></span> Assets
      </a>
      <a href="#" class="sidebar-link" id="nav-payroll">
        <span class="nav-icon"><i class="fas fa-money-check-alt"></i></span> Payroll
      </a>
      <a href="#" class="sidebar-link" id="nav-appreciations">
        <span class="nav-icon"><i class="fas fa-award"></i></span> Appreciations
      </a>
      <a href="#" class="sidebar-link" id="nav-policies">
        <span class="nav-icon"><i class="fas fa-file-contract"></i></span> Company Policies
      </a>
      <a href="#" class="sidebar-link" id="nav-offboardings">
        <span class="nav-icon"><i class="fas fa-user-minus"></i></span> Offboardings
      </a>
      <a href="#" class="sidebar-link" id="nav-finance">
        <span class="nav-icon"><i class="fas fa-wallet"></i></span> Finance
      </a>
    </nav>

    <div class="sidebar-bottom">
      <a href="index.html#login" class="sidebar-link sidebar-logout" id="nav-logout">
        <span class="nav-icon">↩</span> Logout
      </a>
    </div>

  </aside>

  <!-- MAIN -->
  <div class="main-wrap">

    <!-- TOP BAR -->
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div class="topbar-right">
        <span class="admin-badge">Manager</span>
        <span class="admin-email" id="manager-email-display">manager@shnoor.com</span>
      </div>
    </header>

    <!-- CONTENT AREA -->
    <main class="main-content" id="main-content">

      <!-- Dashboard View -->
      <div class="view" id="view-dashboard">
        <div class="page-header">
          <h1 class="page-h1">Dashboard</h1>
          <p class="page-sub">Manager Overview</p>
        </div>
        <div class="panel">
          <div class="panel-body">
            <p style="padding:40px; text-align:center; color:var(--text-light);">Dashboard content coming soon...</p>
          </div>
        </div>
      </div>

      <!-- Placeholder for other views -->
      <div class="view hidden" id="view-placeholder">
        <div class="page-header">
          <h1 class="page-h1" id="placeholder-title">Page</h1>
          <p class="page-sub" id="placeholder-sub">Content for this section</p>
        </div>
        <div class="panel">
          <div class="panel-body">
            <p style="padding:40px; text-align:center; color:var(--text-light);">Skeleton for manager panel.</p>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="manager.js"></script>
</body>
</html>
