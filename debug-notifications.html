<!DOCTYPE html>
<html>
<head>
    <title>Notification Debug</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .log { background: white; padding: 10px; margin: 10px 0; border-radius: 5px; font-family: monospace; font-size: 12px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔔 Notification System Debug</h1>
    <div id="status">Status: Connecting...</div>
    <div id="logs"></div>
    <button onclick="sendTest()">Send Test Notification</button>
    <button onclick="clearLogs()">Clear Logs</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const logs = document.getElementById('logs');
        const status = document.getElementById('status');
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'log ' + type;
            div.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
            logs.appendChild(div);
            console.log(msg);
        }

        const socket = io('/', { transports: ['websocket', 'polling'] });

        socket.on('connect', () => {
            status.textContent = 'Status: ✅ Connected';
            log('Socket connected: ' + socket.id, 'success');
            
            socket.emit('register-global-notifications', {
                email: 'debug@user.com',
                role: 'desktop_client',
                userAgent: navigator.userAgent
            });
            log('Registered for notifications', 'success');
        });

        socket.on('disconnect', () => {
            status.textContent = 'Status: ❌ Disconnected';
            log('Socket disconnected', 'error');
        });

        socket.on('global-notification', (data) => {
            log('📨 RECEIVED NOTIFICATION:', 'success');
            log(JSON.stringify(data, null, 2), 'info');
            
            // Show browser notification
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('HRM: ' + data.senderRole, { body: data.preview });
            }
        });

        socket.on('connect_error', (err) => {
            log('Connection error: ' + err.message, 'error');
        });

        function sendTest() {
            log('Sending test notification...', 'info');
            fetch('/api/global-notifications/test-desktop', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: 'Test from debug page: ' + new Date().toLocaleTimeString() })
            })
            .then(r => r.json())
            .then(data => log('Test sent: ' + JSON.stringify(data), 'success'))
            .catch(e => log('Test failed: ' + e.message, 'error'));
        }

        function clearLogs() {
            logs.innerHTML = '';
        }

        // Request notification permission
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    </script>
</body>
</html>
