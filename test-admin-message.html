<!DOCTYPE html>
<html>
<head>
    <title>Test Admin Message</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .result { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Test Admin Message Notification</h1>
    <button onclick="testAdminMessage()">Send Admin Message "hi mani"</button>
    <button onclick="testDirectNotification()">Send Direct Test Notification</button>
    <div id="result"></div>

    <script>
        async function testAdminMessage() {
            const result = document.getElementById('result');
            result.innerHTML = '<div class="result">Sending admin message...</div>';
            
            try {
                // Simulate admin sending message
                const response = await fetch('/api/v1/chat/message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer fake-token-for-testing'
                    },
                    body: JSON.stringify({
                        session_id: 'test@user.com',
                        content: 'hi mani',
                        target_role: 'public'
                    })
                });
                
                const data = await response.json();
                result.innerHTML = '<div class="result">' + JSON.stringify(data, null, 2) + '</div>';
            } catch (error) {
                result.innerHTML = '<div class="result">Error: ' + error.message + '</div>';
            }
        }

        async function testDirectNotification() {
            const result = document.getElementById('result');
            result.innerHTML = '<div class="result">Sending direct notification...</div>';
            
            try {
                const response = await fetch('/api/global-notifications/test-desktop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: 'Direct test: Admin sent hi mani',
                        senderRole: 'admin',
                        senderEmail: 'admin@shnoor.com'
                    })
                });
                
                const data = await response.json();
                result.innerHTML = '<div class="result">' + JSON.stringify(data, null, 2) + '</div>';
            } catch (error) {
                result.innerHTML = '<div class="result">Error: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
