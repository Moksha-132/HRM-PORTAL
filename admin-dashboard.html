<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard – shnoor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-top">
      <span class="sidebar-brand">shnoor</span>
      <span class="sidebar-tag">Admin</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="sidebar-link active" id="nav-dashboard">
        <span class="nav-icon">⊞</span> Dashboard
      </a>
      <a href="#" class="sidebar-link" id="nav-companies">
        <span class="nav-icon">🏢</span> Companies
      </a>
      <a href="#" class="sidebar-link" id="nav-subscriptions">
        <span class="nav-icon">💳</span> Subscriptions
      </a>
      <a href="#" class="sidebar-link" id="nav-transactions">
        <span class="nav-icon">📄</span> Transactions
      </a>
      <a href="#" class="sidebar-link" id="nav-offline">
        <span class="nav-icon">📥</span> Offline Requests
      </a>
      <a href="#" class="sidebar-link" id="nav-email">
        <span class="nav-icon">✉️</span> Email Queries
      </a>
      <a href="#" class="sidebar-link" id="nav-superadmin">
        <span class="nav-icon">👤</span> Super Admin Management
      </a>
      <a href="#" class="sidebar-link" id="nav-website">
        <span class="nav-icon">🌐</span> Website Settings
      </a>
      <a href="#" class="sidebar-link" id="nav-system">
        <span class="nav-icon">⚙️</span> System Settings
      </a>
    </nav>

    <div class="sidebar-bottom">
      <a href="index.html#login" class="sidebar-link sidebar-logout" id="nav-logout">
        <span class="nav-icon">↩</span> Logout
      </a>
    </div>

  </aside>

  <!-- MAIN -->
  <div class="main-wrap">

    <!-- TOP BAR -->
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div class="topbar-right">
        <span class="admin-badge">Admin</span>
        <span class="admin-email" id="admin-email-display">admin@shnoor.com</span>
      </div>
    </header>

    <!-- CONTENT AREA -->
    <main class="main-content" id="main-content">

      <!-- Dashboard view (default) -->
      <div class="view" id="view-dashboard">
        <div class="page-header">
          <h1 class="page-h1">Dashboard</h1>
          <p class="page-sub">Overview of your platform</p>
        </div>
        <!-- stat cards -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="skel skel-stat-label"></div>
            <div class="skel skel-stat-val"></div>
            <div class="skel skel-stat-sub"></div>
          </div>
          <div class="stat-card">
            <div class="skel skel-stat-label"></div>
            <div class="skel skel-stat-val"></div>
            <div class="skel skel-stat-sub"></div>
          </div>
          <div class="stat-card">
            <div class="skel skel-stat-label"></div>
            <div class="skel skel-stat-val"></div>
            <div class="skel skel-stat-sub"></div>
          </div>
          <div class="stat-card">
            <div class="skel skel-stat-label"></div>
            <div class="skel skel-stat-val"></div>
            <div class="skel skel-stat-sub"></div>
          </div>
        </div>
        <!-- chart placeholder -->
        <div class="row-2">
          <div class="panel">
            <div class="panel-head"><div class="skel skel-panel-title"></div></div>
            <div class="skel skel-chart"></div>
          </div>
          <div class="panel">
            <div class="panel-head"><div class="skel skel-panel-title"></div></div>
            <div class="skel skel-chart skel-chart-sm"></div>
          </div>
        </div>
        <!-- recent table -->
        <div class="panel mt">
          <div class="panel-head">
            <div class="skel skel-panel-title"></div>
            <div class="skel skel-panel-btn"></div>
          </div>
          <div class="table-wrap">
            <div class="skel skel-table-row"></div>
            <div class="skel skel-table-row"></div>
            <div class="skel skel-table-row"></div>
            <div class="skel skel-table-row"></div>
            <div class="skel skel-table-row"></div>
          </div>
        </div>
      </div>

      <!-- Generic placeholder view for all other nav items -->
      <div class="view hidden" id="view-placeholder">
        <div class="page-header">
          <h1 class="page-h1" id="placeholder-title">Section</h1>
          <p class="page-sub" id="placeholder-sub">Manage your data here</p>
        </div>
        <div class="panel">
          <div class="panel-head">
            <div class="skel skel-panel-title"></div>
            <div class="skel skel-panel-btn"></div>
          </div>
          <div class="table-wrap">
            <div class="skel skel-table-row"></div>
            <div class="skel skel-table-row"></div>
            <div class="skel skel-table-row"></div>
            <div class="skel skel-table-row"></div>
            <div class="skel skel-table-row"></div>
            <div class="skel skel-table-row"></div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
